# Kimnata

Локальна система управління бронюванням конференц-залів та аудиторій за темою дипломної роботи.

## Що реалізовано

- реєстрація та вхід користувачів;
- ролі `user`, `moderator`, `admin`;
- каталог конференц-залів, переговорних та аудиторій;
- карта розташування приміщень;
- календар зайнятості;
- створення бронювання з часом початку та завершення;
- перевірка часових конфліктів;
- особистий кабінет "Мої бронювання";
- скасування бронювання;
- QR-код підтвердження бронювання;
- адмін-панель зі статистикою та списком бронювань;
- файлова база даних у папці `data`.

## Потрібні програми

Docker не потрібен. Для запуску потрібен лише Node.js.

На цій машині можна запускати `start_site.bat`: він спробує використати вбудований Node runtime Codex Desktop, а якщо його немає - системний `node`.

## Запуск

```bat
start_site.bat
```

Або:

```bash
npm start
```

Після запуску відкрити:

```text
http://localhost:3000
```

## Файлова база

- `data/users.json` - користувачі;
- `data/bookings.json` - бронювання.

Ці файли не віддаються браузеру напряму, з ними працює тільки сервер.

## Адміністратор

Під час запуску сервер автоматично створює адміністратора, якщо його ще немає:

```text
Email: admin@kimnata.local
Password: Admin123!
```

Адміністратор бачить вкладку `Адмін`, може переглядати всі заявки на бронювання, одобряти їх, відхиляти або скасовувати.

Додаткові права адміністратора:

- створення нової броні від імені адміністратора;
- видалення заявки/бронювання з бази;
- блокування користувача;
- зняття блокування з користувача;
- перегляд списку користувачів і їхніх ролей.
